apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-nginx-html
data:
  index.html: |
    <!doctype html>
    <html>
    <head>
      <title>Argo CD GitOps Demo</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          margin: 48px;
          color: #222;
        }
        .box {
          border: 1px solid #ddd;
          padding: 24px;
          max-width: 640px;
        }
        h1 {
          margin-top: 0;
        }
      </style>
    </head>
    <body>
      <div class="box">
        <h1>Hello from Argo CD GitOps Demo</h1>
        <p>Version 1</p>
        <p>This page is served by nginx and loaded from a Kubernetes ConfigMap.</p>
      </div>
    </body>
    </html>
